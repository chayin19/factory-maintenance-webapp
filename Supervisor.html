<!doctype html>
<html lang="th">
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <?!= include('Styles'); ?>
  </head>
  <body>
    <main class="app-shell">
      <div class="topbar">
        <h1 class="h4 fw-bold mb-2">แดชบอร์ดหัวหน้างาน</h1>
        <div class="nav-grid">
          <button class="btn btn-outline-primary" onclick="goHome()">หน้าแรก</button>
          <button class="btn btn-outline-primary" onclick="goTechnician()">หน้าช่าง</button>
          <button class="btn btn-primary" onclick="goSupervisor()">Dashboard</button>
        </div>
      </div>

      <div id="alertArea"></div>
      <section id="dashboardArea"><div class="loading">กำลังโหลดแดชบอร์ด...</div></section>
    </main>

    <?!= include('Shared'); ?>
    <script>
      google.script.run
        .withSuccessHandler(renderDashboard)
        .withFailureHandler(function(error) { showError(error.message); })
        .getSupervisorDashboard();

      function renderDashboard(data) {
        const summary = data.summary;
        document.getElementById('dashboardArea').innerHTML =
          '<section class="row g-2">'
          + metric('งานเปิด', summary.open)
          + metric('กำลังซ่อม', summary.inProgress)
          + metric('ปิดวันนี้', summary.closedToday)
          + metric('หยุดเครื่องวันนี้', summary.downtimeToday + ' นาที')
          + '</section>'
          + tableSection('เครื่องที่แจ้งซ่อมสูงสุด', ['เครื่องจักร', 'จำนวน'], data.topMachines.map(function(row) { return [row.label, row.count]; }))
          + tableSection('อาการที่พบสูงสุด', ['อาการ', 'จำนวน'], data.topProblems.map(function(row) { return [row.label, row.count]; }))
          + waitingSection(data.waitingOver30);
      }

      function metric(label, value) {
        return '<div class="col-6"><div class="compact-card metric"><div class="small-muted">' + escapeHtml(label) + '</div><div class="metric-value">' + escapeHtml(value) + '</div></div></div>';
      }

      function tableSection(title, headers, rows) {
        const body = rows.length ? rows.map(function(row) {
          return '<tr><td>' + escapeHtml(row[0]) + '</td><td class="text-end fw-bold">' + escapeHtml(row[1]) + '</td></tr>';
        }).join('') : '<tr><td colspan="2" class="text-center small-muted">ยังไม่มีข้อมูล</td></tr>';
        return '<section class="compact-card"><h2 class="h5 fw-bold">' + escapeHtml(title) + '</h2><div class="table-responsive"><table class="table align-middle mb-0"><thead><tr><th>' + escapeHtml(headers[0]) + '</th><th class="text-end">' + escapeHtml(headers[1]) + '</th></tr></thead><tbody>' + body + '</tbody></table></div></section>';
      }

      function waitingSection(rows) {
        const body = rows.length ? rows.map(function(row) {
          return '<tr><td><div class="fw-bold">' + escapeHtml(row.request_id) + '</div><div class="small-muted">' + escapeHtml(row.machine_id) + '</div></td><td>' + escapeHtml(row.problem_name) + '</td></tr>';
        }).join('') : '<tr><td colspan="2" class="text-center small-muted">ไม่มีงานที่รอเกิน 30 นาที</td></tr>';
        return '<section class="compact-card"><h2 class="h5 fw-bold">งานที่รอเกิน 30 นาที</h2><div class="table-responsive"><table class="table align-middle mb-0"><thead><tr><th>เลขที่งาน</th><th>อาการ</th></tr></thead><tbody>' + body + '</tbody></table></div></section>';
      }
    </script>
  </body>
</html>

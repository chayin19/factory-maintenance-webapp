<!doctype html>
<html lang="th">
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <?!= include('Styles'); ?>
  </head>
  <body>
    <main class="app-shell">
      <div class="topbar">
        <h1 class="h4 fw-bold mb-2">แจ้งซ่อม</h1>
        <div class="nav-grid">
          <button class="btn btn-outline-primary" onclick="goHome()">หน้าแรก</button>
          <button class="btn btn-outline-primary" onclick="goTechnician()">หน้าช่าง</button>
          <button class="btn btn-outline-primary" onclick="goSupervisor()">Dashboard</button>
        </div>
      </div>

      <div id="alertArea"></div>
      <section id="contentArea">
        <div class="loading">กำลังโหลดข้อมูล...</div>
      </section>
    </main>

    <?!= include('Shared'); ?>
    <script>
      const machineId = '<?= machineId ?>';
      const state = { problem: null, severity: '' };

      google.script.run
        .withSuccessHandler(renderPage)
        .withFailureHandler(function(error) { showError(error.message); })
        .getReportPageData(machineId);

      function renderPage(data) {
        const machine = data.machine;
        const groups = data.problemGroups || {};
        const problemHtml = Object.keys(groups).map(function(group) {
          const buttons = groups[group].map(function(problem) {
            return '<button type="button" class="btn btn-outline-primary choice-btn" data-problem="' + escapeHtml(problem.problem_code) + '" onclick="selectProblem(this,\'' + escapeHtml(problem.problem_code) + '\',\'' + escapeHtml(problem.problem_name_th) + '\',\'' + escapeHtml(group) + '\')">' + escapeHtml(problem.problem_name_th) + '</button>';
          }).join('');
          return '<h3 class="h6 fw-bold mt-3">' + escapeHtml(group) + '</h3><div class="choice-grid two">' + buttons + '</div>';
        }).join('');

        document.getElementById('contentArea').innerHTML =
          '<section class="compact-card">'
          + '<div class="fw-bold">' + escapeHtml(machine.machine_id) + ' - ' + escapeHtml(machine.machine_name) + '</div>'
          + '<div class="small-muted">' + escapeHtml(machine.plant_name) + ' / ' + escapeHtml(machine.machine_type) + ' / ' + escapeHtml(machine.location || '') + '</div>'
          + '</section>'
          + '<form id="reportForm" onsubmit="submitForm(event)">'
          + '<section class="compact-card"><h2 class="h5 fw-bold">เลือกอาการเสีย</h2>' + problemHtml
          + '<h3 class="h6 fw-bold mt-3">ไม่พบอาการที่ตรง</h3><div class="choice-grid two">'
          + '<button type="button" class="btn btn-outline-secondary choice-btn" onclick="selectProblem(this,\'OTHER\',\'อื่น ๆ / ไม่อยู่ในรายการ\',\'รอทบทวน\')">อื่น ๆ / ไม่อยู่ในรายการ</button>'
          + '<button type="button" class="btn btn-outline-secondary choice-btn" onclick="selectProblem(this,\'UNSURE\',\'ไม่แน่ใจ ให้ช่างประเมิน\',\'รอทบทวน\')">ไม่แน่ใจ ให้ช่างประเมิน</button>'
          + '</div></section>'
          + '<section class="compact-card"><h2 class="h5 fw-bold">ระดับความรุนแรง</h2><div class="choice-grid three">'
          + severityButton('หยุดเครื่อง') + severityButton('ผลิตได้แต่เสี่ยงเสีย') + severityButton('แจ้งตรวจสอบ')
          + '</div></section>'
          + '<section class="compact-card">'
          + '<label class="form-label fw-bold" for="note">รายละเอียดเพิ่มเติม</label><textarea class="form-control mb-3" id="note" rows="3" placeholder="พิมพ์รายละเอียดสั้น ๆ"></textarea>'
          + '<label class="form-label fw-bold" for="imageUrl">ลิงก์รูปภาพ</label><input class="form-control" id="imageUrl" type="url" placeholder="https://...">'
          + '</section>'
          + '<button id="submitBtn" class="btn btn-success btn-xl w-100" type="submit">ส่งใบแจ้งซ่อม</button>'
          + '</form>';
      }

      function severityButton(label) {
        return '<button type="button" class="btn btn-outline-danger choice-btn" onclick="selectSeverity(this,\'' + label + '\')">' + label + '</button>';
      }

      function selectProblem(button, code, name, group) {
        document.querySelectorAll('[data-problem], .btn-outline-secondary.choice-btn').forEach(function(item) { item.classList.remove('active'); });
        button.classList.add('active');
        state.problem = { code: code, name: name, group: group };
      }

      function selectSeverity(button, severity) {
        document.querySelectorAll('.choice-btn.btn-outline-danger').forEach(function(item) { item.classList.remove('active'); });
        button.classList.add('active');
        state.severity = severity;
      }

      function submitForm(event) {
        event.preventDefault();
        clearError();
        if (!state.problem) return showError('กรุณาเลือกอาการเสีย');
        if (!state.severity) return showError('กรุณาเลือกระดับความรุนแรง');
        document.getElementById('submitBtn').disabled = true;
        google.script.run
          .withSuccessHandler(function(result) {
            document.getElementById('contentArea').innerHTML = '<section class="compact-card text-center"><h2 class="h4 fw-bold text-success">ส่งใบแจ้งซ่อมแล้ว</h2><p class="fs-5 mb-1">เลขที่งาน</p><div class="display-6 fw-bold">' + escapeHtml(result.request_id) + '</div><button class="btn btn-primary btn-lg mt-4" onclick="goHome()">กลับหน้าแรก</button></section>';
          })
          .withFailureHandler(function(error) {
            document.getElementById('submitBtn').disabled = false;
            showError(error.message);
          })
          .submitRepairRequest({
            machine_id: machineId,
            problem_code: state.problem.code,
            problem_name: state.problem.name,
            problem_group: state.problem.group,
            severity: state.severity,
            note: document.getElementById('note').value,
            image_url: document.getElementById('imageUrl').value
          });
      }
    </script>
  </body>
</html>
